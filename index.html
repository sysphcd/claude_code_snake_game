<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #e0e0e0;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: 4px; color: #4ecca3; }
    #score { font-size: 1.1rem; margin-bottom: 1rem; color: #a0a0c0; }
    canvas {
      border: 2px solid #4ecca3;
      background: #0f0f23;
      display: block;
    }
    #message {
      margin-top: 1rem;
      font-size: 1rem;
      color: #a0a0c0;
      height: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="score">Score: 0</div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message">Press any arrow key to start</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, dir, nextDir, foods, superFood, superFoodTimer, superFoodSpawnCounter, score, running, paused, intervalId;

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      running = false;
      paused = false;
      superFood = null;
      superFoodTimer = 0;
      superFoodSpawnCounter = 0;
      scoreEl.textContent = 'Score: 0';
      messageEl.textContent = 'Press any arrow key to start';
      foods = [];
      spawnFood();
      spawnFood();
      draw();
    }

    function spawnFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (
        snake.some(s => s.x === pos.x && s.y === pos.y) ||
        foods.some(f => f.x === pos.x && f.y === pos.y)
      );
      foods.push(pos);
    }

    function spawnSuperFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (
        snake.some(s => s.x === pos.x && s.y === pos.y) ||
        foods.some(f => f.x === pos.x && f.y === pos.y)
      );
      superFood = pos;
      superFoodTimer = 50;
    }

    function start() {
      if (intervalId) clearInterval(intervalId);
      running = true;
      messageEl.textContent = '';
      intervalId = setInterval(tick, 120);
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      if (paused) {
        drawPaused();
        messageEl.textContent = 'Paused — Press Space to resume';
      } else {
        messageEl.textContent = '';
        draw();
      }
    }

    function tick() {
      if (paused) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wrap around walls
      head.x = (head.x + COLS) % COLS;
      head.y = (head.y + ROWS) % ROWS;
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      const tail = { ...snake[snake.length - 1] };
      snake.unshift(head);
      snake.pop();

      const eatenIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
      if (eatenIndex !== -1) {
        score++;
        scoreEl.textContent = `Score: ${score}`;
        foods.splice(eatenIndex, 1);
        spawnFood();
        snake.push(tail);
      }

      if (superFood && head.x === superFood.x && head.y === superFood.y) {
        score += 3;
        scoreEl.textContent = `Score: ${score}`;
        snake.push({ ...tail });
        snake.push({ ...tail });
        superFood = null;
        superFoodSpawnCounter = 0;
      }

      // Super food lifecycle
      superFoodSpawnCounter++;
      if (!superFood && superFoodSpawnCounter >= 25) {
        superFoodSpawnCounter = 0;
        spawnSuperFood();
      }
      if (superFood && --superFoodTimer <= 0) superFood = null;

      draw();
    }

    function gameOver() {
      clearInterval(intervalId);
      running = false;
      messageEl.textContent = `Game over! Score: ${score} — Press any arrow key to restart`;
      drawGameOver();
    }

    function drawStar(cx, cy, r) {
      const pts = 5, inner = r * 0.42;
      ctx.beginPath();
      for (let i = 0; i < pts * 2; i++) {
        const angle = (i * Math.PI) / pts - Math.PI / 2;
        const rad = i % 2 === 0 ? r : inner;
        i === 0 ? ctx.moveTo(cx + rad * Math.cos(angle), cy + rad * Math.sin(angle))
                : ctx.lineTo(cx + rad * Math.cos(angle), cy + rad * Math.sin(angle));
      }
      ctx.closePath();
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid (subtle)
      ctx.strokeStyle = '#1a1a3e';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Food
      ctx.fillStyle = '#ff6b6b';
      foods.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x * CELL + CELL / 2, f.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
      });

      // Super food — gold star, blinks when about to expire
      if (superFood) {
        const blink = superFoodTimer <= 10 && Math.floor(superFoodTimer / 2) % 2 === 0;
        if (!blink) {
          ctx.fillStyle = '#ffd700';
          drawStar(superFood.x * CELL + CELL / 2, superFood.y * CELL + CELL / 2, CELL / 2 - 1);
        }
      }

      // Snake
      snake.forEach((seg, i) => {
        const alpha = 1 - (i / snake.length) * 0.5;
        ctx.fillStyle = i === 0 ? '#4ecca3' : `rgba(78, 204, 163, ${alpha})`;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function drawPaused() {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#4ecca3';
      ctx.font = 'bold 2rem monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      ctx.textAlign = 'left';
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#4ecca3';
      ctx.font = 'bold 2rem monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
      ctx.textAlign = 'left';
    }

    const keyMap = {
      ArrowUp:    { x: 0, y: -1 },
      ArrowDown:  { x: 0, y: 1 },
      ArrowLeft:  { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 },
    };

    document.addEventListener('keydown', e => {
      if (e.key === ' ') {
        e.preventDefault();
        togglePause();
        return;
      }
      const d = keyMap[e.key];
      if (!d) return;
      e.preventDefault();
      // Prevent reversing
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
      if (!running) {
        if (!running && score > 0) init();  // restart after game over
        start();
      }
    });

    init();
  </script>
</body>
</html>
